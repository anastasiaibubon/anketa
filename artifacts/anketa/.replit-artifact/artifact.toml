kind = "web"
previewPath = "/"
title = "Анкета для друзів"
version = "1.0.0"
id = "artifacts/anketa"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20090

[services.development]
run = "pnpm --filter @workspace/anketa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anketa", "run", "build" ]
serve = "static"
publicDir = "artifacts/anketa/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20090"
BASE_PATH = "/"
